name: YRL Bets - Otomatik Tarama

on:
  # Her 30 dakikada bir otomatik çalış (15dk GitHub quota'yı hızlı tüketir)
  schedule:
    - cron: '*/30 * * * *'
  # Manuel çalıştırma (GitHub arayüzünden Actions > Run workflow)
  workflow_dispatch:

jobs:
  scan:
    name: Telegram Tarama & Sonuç Kontrolü
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: ⚙️ Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Bağımlılıkları Yükle
        run: npm ci

      - name: 🚀 Taramayı Çalıştır
        id: scan
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scan.js

      - name: ✅ Tarama Başarılı
        if: success()
        run: |
          echo "✅ Tarama başarıyla tamamlandı!"
          echo "Zaman: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: ❌ Hata Bildirimi
        if: failure()
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "❌ Tarama başarısız oldu!"
          echo "Hata zamanı: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "GitHub Actions loglarını kontrol edin:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Hata bildirimini Telegram'a gönder
          node -e "
          import('telegram').then(async ({ TelegramClient }) => {
            const { StringSession } = await import('telegram/sessions/index.js');
            const client = new TelegramClient(
              new StringSession(process.env.TELEGRAM_SESSION || ''),
              parseInt(process.env.TELEGRAM_API_ID),
              process.env.TELEGRAM_API_HASH,
              { connectionRetries: 3 }
            );
            await client.connect();
            await client.sendMessage('me', {
              message: '⚠️ YRL Bets Scanner HATA!\n\nGitHub Actions taraması başarısız oldu.\nLog: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
            await client.disconnect();
          }).catch(console.error);
          " || echo "Telegram bildirimi gönderilemedi (normal olabilir)"
