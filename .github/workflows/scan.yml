name: YRL Bets - Otomatik Tarama

on:
  # Her 30 dakikada bir otomatik çalış
  schedule:
    - cron: '*/30 * * * *'
  # Manuel çalıştırma (GitHub arayüzünden Actions > Run workflow)
  workflow_dispatch:

jobs:
  scan:
    name: Telegram Tarama & Sonuç Kontrolü
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: ⚙️ Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Bağımlılıkları Yükle
        run: npm ci

      - name: 🔑 Secrets Kontrolü
        run: |
          echo "=== Secrets Kontrol Ediliyor ==="
          if [ -z "$TELEGRAM_API_ID" ]; then
            echo "❌ HATA: TELEGRAM_API_ID secret eksik!"
            echo "GitHub > Settings > Secrets > Actions > New secret"
            exit 1
          else
            echo "✅ TELEGRAM_API_ID: mevcut"
          fi
          if [ -z "$TELEGRAM_API_HASH" ]; then
            echo "❌ HATA: TELEGRAM_API_HASH secret eksik!"
            exit 1
          else
            echo "✅ TELEGRAM_API_HASH: mevcut"
          fi
          if [ -z "$TELEGRAM_SESSION" ]; then
            echo "❌ HATA: TELEGRAM_SESSION secret eksik!"
            exit 1
          else
            echo "✅ TELEGRAM_SESSION: mevcut (${#TELEGRAM_SESSION} karakter)"
          fi
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "❌ HATA: FIREBASE_SERVICE_ACCOUNT secret eksik!"
            exit 1
          else
            echo "✅ FIREBASE_SERVICE_ACCOUNT: mevcut"
          fi
          echo "=== Tüm secrets hazır! ==="
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 🚀 Taramayı Çalıştır
        id: scan
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scan.js

      - name: ✅ Tarama Başarılı
        if: success()
        run: |
          echo "✅ Tarama başarıyla tamamlandı!"
          echo "Zaman: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: ❌ Hata Bildirimi
        if: failure()
        run: |
          echo "❌ Tarama başarısız oldu!"
          echo "Hata zamanı: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
